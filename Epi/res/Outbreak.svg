<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1"
     width="300" height="380" viewBox="0 0 300 380">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1c1f2a"/>
      <stop offset="100%" stop-color="#11131a"/>
    </linearGradient>
    <linearGradient id="strip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#23273a"/>
      <stop offset="100%" stop-color="#161824"/>
    </linearGradient>
  </defs>

  <rect width="300" height="380" fill="url(#bg)"/>
  <rect x="0" y="0" width="300" height="36" fill="url(#strip)"/>
  <!-- family-stripe --><rect x="0" y="36" width="300" height="3" fill="#f57878" opacity="0.75"/>
  <rect x="10" y="44" width="280" height="190" fill="#080a10" stroke="#2b2f42" stroke-width="0.5"/>

  <!-- All panel lettering (POP, beta, gamma, TYPE, K, beta-NET, SEED, IN, OUT,
       jack labels) is drawn at runtime by PanelLabels/ModuleTitle via NanoVG.
       NanoSVG cannot render SVG lettering elements, so none belong here. -->

  <line x1="8" y1="235" x2="292" y2="235" stroke="#2b2f42" stroke-width="0.4"/>
  <line x1="8" y1="296" x2="292" y2="296" stroke="#2b2f42" stroke-width="0.4"/>
  <line x1="8" y1="339" x2="292" y2="339" stroke="#2b2f42" stroke-width="0.4"/>
</svg>
