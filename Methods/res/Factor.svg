<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1"
     width="270" height="380" viewBox="0 0 270 380">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1c1f2a"/>
      <stop offset="100%" stop-color="#11131a"/>
    </linearGradient>
    <linearGradient id="strip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#23273a"/>
      <stop offset="100%" stop-color="#161824"/>
    </linearGradient>
  </defs>

  <rect width="270" height="380" fill="url(#bg)"/>

  <rect x="0" y="0" width="270" height="36" fill="url(#strip)"/>
  <!-- family-stripe --><rect x="0" y="36" width="270" height="3" fill="#6ec8e0" opacity="0.75"/>
  <text x="135" y="24" fill="#ffffff" style="fill:#ffffff" font-family="Helvetica, Arial, sans-serif"
        font-size="15" font-weight="bold" text-anchor="middle" letter-spacing="2">FACTOR</text>

  <!-- XY scope (left, square) -->
  <rect x="8" y="44" width="140" height="140" fill="#080a10" stroke="#2b2f42" stroke-width="0.5"/>
  <text x="78" y="200" fill="#7c91d1" font-family="Helvetica, Arial, sans-serif"
        font-size="7" text-anchor="middle" letter-spacing="1">PC1 ↔ PC2</text>

  <!-- Loadings bar chart (right) -->
  <rect x="156" y="44" width="106" height="140" fill="#080a10" stroke="#2b2f42" stroke-width="0.5"/>
  <text x="209" y="200" fill="#7c91d1" font-family="Helvetica, Arial, sans-serif"
        font-size="7" text-anchor="middle" letter-spacing="1">LOADINGS  |W|</text>

  <!-- Input header -->
  <text x="135" y="220" fill="#9aa0b4" font-family="Helvetica, Arial, sans-serif"
        font-size="9" text-anchor="middle" letter-spacing="2" font-weight="bold">INPUTS</text>

  <text x="35"  y="240" fill="#9aa0b4" font-family="Helvetica, Arial, sans-serif"
        font-size="8" text-anchor="middle">A1</text>
  <text x="75"  y="240" fill="#9aa0b4" font-family="Helvetica, Arial, sans-serif"
        font-size="8" text-anchor="middle">A2</text>
  <text x="115" y="240" fill="#9aa0b4" font-family="Helvetica, Arial, sans-serif"
        font-size="8" text-anchor="middle">A3</text>
  <text x="155" y="240" fill="#9aa0b4" font-family="Helvetica, Arial, sans-serif"
        font-size="8" text-anchor="middle">A4</text>
  <text x="195" y="240" fill="#9aa0b4" font-family="Helvetica, Arial, sans-serif"
        font-size="8" text-anchor="middle">A5</text>
  <text x="235" y="240" fill="#9aa0b4" font-family="Helvetica, Arial, sans-serif"
        font-size="8" text-anchor="middle">A6</text>

  <rect x="0" y="280" width="270" height="100" fill="url(#strip)"/>

  <text x="50"  y="298" fill="#9aa0b4" font-family="Helvetica, Arial, sans-serif"
        font-size="8" text-anchor="middle" letter-spacing="2">RATE</text>
  <text x="105" y="298" fill="#9aa0b4" font-family="Helvetica, Arial, sans-serif"
        font-size="8" text-anchor="middle" letter-spacing="2">SCALE</text>
  <text x="160" y="298" fill="#9aa0b4" font-family="Helvetica, Arial, sans-serif"
        font-size="8" text-anchor="middle" letter-spacing="2">CENTER</text>
  <text x="200" y="298" fill="#9aa0b4" font-family="Helvetica, Arial, sans-serif"
        font-size="8" text-anchor="middle" letter-spacing="2">FREEZE</text>
  <text x="240" y="298" fill="#9aa0b4" font-family="Helvetica, Arial, sans-serif"
        font-size="8" text-anchor="middle" letter-spacing="2">RESET</text>

  <text x="75"  y="362" fill="#e0c44b" font-family="Helvetica, Arial, sans-serif"
        font-size="8" text-anchor="middle" letter-spacing="1" font-weight="bold">PC1</text>
  <text x="135" y="362" fill="#4fb6cf" font-family="Helvetica, Arial, sans-serif"
        font-size="8" text-anchor="middle" letter-spacing="1" font-weight="bold">PC2</text>
  <text x="195" y="362" fill="#cf5f8e" font-family="Helvetica, Arial, sans-serif"
        font-size="8" text-anchor="middle" letter-spacing="1" font-weight="bold">PC3</text>
</svg>
