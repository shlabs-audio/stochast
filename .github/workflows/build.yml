name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# Build SHLabs VCV Rack plugins for all four platforms on native runners,
# each using the matching official Rack Plugin SDK. Auto-discovers every
# plugin.json, so it works whether sources sit at the repo root or in
# per-module subfolders.
env:
  SDK_VERSION: "2.6.6"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: lin-x64,   os: ubuntu-latest,  sdk: lin-x64 }
          - { name: win-x64,   os: windows-latest, sdk: win-x64 }
          - { name: mac-x64,   os: macos-15-intel, sdk: mac-x64 }
          - { name: mac-arm64, os: macos-14,       sdk: mac-arm64 }
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc make wget unzip zip jq

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential wget unzip zip

      # The build logic is identical across platforms; only the shell differs.
      # `shell:` accepts no expressions, so Windows (MSYS2/MinGW) and the Unix
      # platforms get their own step rather than templating the shell.
      - name: Build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          wget -q "https://vcvrack.com/downloads/Rack-SDK-${SDK_VERSION}-${{ matrix.sdk }}.zip" -O sdk.zip
          unzip -q sdk.zip
          export RACK_DIR="$PWD/Rack-SDK"
          mkdir -p _artifacts
          found=0
          while IFS= read -r pj; do
            dir=$(dirname "$pj")
            found=1
            echo "::group::Building $dir"
            make -C "$dir" dist RACK_DIR="$RACK_DIR"
            echo "::endgroup::"
          done < <(find . -name plugin.json -not -path '*/Rack-SDK/*' -not -path '*/dep/*' -not -path '*/dist/*')
          if [ "$found" = "0" ]; then echo "No plugin.json found"; exit 1; fi
          find . -path '*/dist/*.vcvplugin' -exec cp {} _artifacts/ \;
          echo "Built:"; ls -la _artifacts

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: 'msys2 {0}'
        run: |
          set -e
          wget -q "https://vcvrack.com/downloads/Rack-SDK-${SDK_VERSION}-${{ matrix.sdk }}.zip" -O sdk.zip
          unzip -q sdk.zip
          export RACK_DIR="$PWD/Rack-SDK"
          mkdir -p _artifacts
          found=0
          while IFS= read -r pj; do
            dir=$(dirname "$pj")
            found=1
            echo "::group::Building $dir"
            make -C "$dir" dist RACK_DIR="$RACK_DIR"
            echo "::endgroup::"
          done < <(find . -name plugin.json -not -path '*/Rack-SDK/*' -not -path '*/dep/*' -not -path '*/dist/*')
          if [ "$found" = "0" ]; then echo "No plugin.json found"; exit 1; fi
          find . -path '*/dist/*.vcvplugin' -exec cp {} _artifacts/ \;
          echo "Built:"; ls -la _artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: _artifacts/*.vcvplugin
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Attach .vcvplugin files to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.vcvplugin
          fail_on_unmatched_files: true
